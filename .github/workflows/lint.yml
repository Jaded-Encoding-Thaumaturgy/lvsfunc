name: Lint Python code

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/lint.yml"
      - "**.py*"
      - "pyproject.toml"
  pull_request:
    paths:
      - ".github/workflows/lint.yml"
      - "**.py*"
      - "pyproject.toml"
  workflow_dispatch:

permissions:
  contents: read

env:
  LVSFUNC_PYTHON_VERSION: 3.14
  UV_NO_SYNC: "1"

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ env.LVSFUNC_PYTHON_VERSION }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Lint
        run: uv run poe lint-ci

      - name: Post webhook for failure
        if: failure()
        uses: Jaded-Encoding-Thaumaturgy/discord-failure-notifier@v1
        with:
          webhook-url: ${{ secrets.WEBHOOK_URL }}
